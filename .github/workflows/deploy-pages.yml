name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Validate static app
        run: npm run check

      - name: Build static site
        env:
          GAODE_MAP_KEY: ${{ secrets.GAODE_MAP_KEY }}
          GAODE_MAP_WEB_SECRET_KEY: ${{ secrets.GAODE_MAP_WEB_SECRET_KEY }}
          GAODE_SECURITY_JS_CODE: ${{ secrets.GAODE_SECURITY_JS_CODE }}
          GAODE_MAP_SECURITY_CODE: ${{ secrets.GAODE_MAP_WEB_SECRET_KEY }}
          AMAP_KEY: ${{ secrets.AMAP_KEY }}
          AMAP_SECURITY_JS_CODE: ${{ secrets.AMAP_SECURITY_JS_CODE }}
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
