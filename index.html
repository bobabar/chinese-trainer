<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Adaptive Mandarin vocabulary, grammar, pronunciation, mock HSK exams, geography, and sentence practice.">
    <meta name="theme-color" content="#f7f8fb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Chinese Trainer">
    <meta property="og:title" content="Chinese Trainer">
    <meta property="og:description" content="Adaptive Mandarin learning with vocabulary, grammar, pronunciation, mock HSK exams, geography, and sentence practice.">
    <meta property="og:type" content="website">
    <title>Chinese Trainer</title>
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body data-tool="dashboard">
    <noscript>
      <div class="noscript-message">
        Chinese Trainer requires JavaScript for session generation, answer checking, and audio playback.
      </div>
    </noscript>

    <div class="app-shell">
      <header class="topbar">
        <div class="brand-row">
          <div class="brand">
            <img class="brand-mark" src="./assets/icon.svg" alt="" aria-hidden="true">
            <div>
              <h1>Chinese Trainer</h1>
              <p>Adaptive vocabulary, grammar, mock exams, pronunciation, geography, and sentence practice</p>
            </div>
          </div>

          <div class="brand-actions">
            <button
              class="global-search-trigger"
              type="button"
              id="globalSearchTrigger"
              aria-label="Search the learning library"
              aria-haspopup="dialog"
              aria-controls="globalSearchDialog">
              <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="m20 20-4-4"></path>
              </svg>
              <span class="global-search-trigger-label">Search</span>
              <kbd class="global-search-trigger-shortcut">⌘K</kbd>
            </button>
            <button
              class="account-trigger"
              type="button"
              id="accountTrigger"
              aria-label="Sign in or create an account"
              aria-haspopup="dialog"
              aria-controls="accountDialog">
              <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <circle cx="12" cy="8" r="3.5"></circle>
                <path d="M5 21a7 7 0 0 1 14 0"></path>
              </svg>
              <span class="account-trigger-label">Sign in</span>
              <span class="account-trigger-badge" hidden>Premium</span>
            </button>
          </div>
        </div>

        <nav class="tool-nav" aria-label="Tools">
          <button class="tool-tab" type="button" data-tool="dashboard">
            <svg class="button-icon tool-tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M3 11.5L12 4l9 7.5"></path>
              <path d="M5.5 10v10h13V10"></path>
              <path d="M9 15l2 2 4-4"></path>
            </svg>
            <span class="tool-tab-label">Today</span>
          </button>
          <button class="tool-tab" type="button" data-tool="vocabulary">
            <svg class="button-icon tool-tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M5 5h11a3 3 0 0 1 3 3v11H8a3 3 0 0 1-3-3V5z"></path>
              <path d="M9 9h6"></path>
              <path d="M9 13h4"></path>
              <path d="M19 8h1a2 2 0 0 1 2 2v11h-3"></path>
            </svg>
            <span class="tool-tab-label">Vocabulary Quiz</span>
          </button>
          <button class="tool-tab" type="button" data-tool="review">
            <svg class="button-icon tool-tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M20 7v5h-5"></path>
              <path d="M19 12a7 7 0 1 1-2-5"></path>
              <path d="M9 12l2 2 4-4"></path>
            </svg>
            <span class="tool-tab-label">Daily Review</span>
          </button>
          <button class="tool-tab" type="button" data-tool="grammar">
            <svg class="button-icon tool-tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v16H7a3 3 0 0 0-3 3V5.5z"></path>
              <path d="M8 7h8"></path>
              <path d="M8 11h5"></path>
              <path d="M15 14l1.5 1.5L20 12"></path>
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17h7"></path>
            </svg>
            <span class="tool-tab-label">Grammar Lab</span>
          </button>
          <button class="tool-tab" type="button" data-tool="reader">
            <svg class="button-icon tool-tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H11v17H6.5A2.5 2.5 0 0 0 4 22V5.5z"></path>
              <path d="M20 5.5A2.5 2.5 0 0 0 17.5 3H13v17h4.5A2.5 2.5 0 0 1 20 22V5.5z"></path>
              <path d="M7 8h2"></path>
              <path d="M15 8h2"></path>
            </svg>
            <span class="tool-tab-label">Graded Readers</span>
          </button>
          <button class="tool-tab" type="button" data-tool="exam">
            <svg class="button-icon tool-tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M7 3h10v4H7z"></path>
              <path d="M5 5h14v16H5z"></path>
              <path d="m8 12 2 2 4-4"></path>
              <path d="M8 17h8"></path>
            </svg>
            <span class="tool-tab-label">Mock HSK Exam</span>
          </button>
          <button class="tool-tab" type="button" data-tool="pronunciation">
            <svg class="button-icon tool-tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M12 3a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z"></path>
              <path d="M5 10v1a7 7 0 0 0 14 0v-1"></path>
              <path d="M12 18v3"></path>
              <path d="M8 21h8"></path>
            </svg>
            <span class="tool-tab-label">Pronunciation</span>
          </button>
          <button class="tool-tab" type="button" data-tool="map">
            <svg class="button-icon tool-tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M9 18l-6 3V6l6-3 6 3 6-3v15l-6 3-6-3z"></path>
              <path d="M9 3v15"></path>
              <path d="M15 6v15"></path>
              <path d="M6.5 9.5h.01"></path>
              <path d="M12 12h.01"></path>
              <path d="M17.5 8.5h.01"></path>
            </svg>
            <span class="tool-tab-label">Geography of China</span>
          </button>
          <button class="tool-tab" type="button" data-tool="drill">
            <svg class="button-icon tool-tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M4 5.5A2.5 2.5 0 0 1 6.5 3H20v16H7a3 3 0 0 0-3 3V5.5z"></path>
              <path d="M8 7h8"></path>
              <path d="M8 11h6"></path>
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
            </svg>
            <span class="tool-tab-label">Sentence Drills</span>
          </button>
          <button class="tool-tab" type="button" data-tool="history">
            <svg class="button-icon tool-tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M3 12a9 9 0 1 0 3-6.7"></path>
              <path d="M3 4v5h5"></path>
              <path d="M12 7v5l3 2"></path>
            </svg>
            <span class="tool-tab-label">History</span>
          </button>
        </nav>
      </header>

      <div class="tool-controls">
        <nav class="mode-nav drill-only" aria-label="Training type">
          <button class="mode-tab" type="button" data-mode="reading">Reading</button>
          <button class="mode-tab" type="button" data-mode="writing">Writing</button>
          <button class="mode-tab" type="button" data-mode="listening">Listening</button>
        </nav>

        <nav class="mode-nav vocabulary-mode-nav vocabulary-only vocabulary-quiz-only" aria-label="Vocabulary quiz type">
          <button class="mode-tab" type="button" data-vocabulary-mode="pinyin">Pinyin</button>
          <button class="mode-tab" type="button" data-vocabulary-mode="meaning">Audio</button>
        </nav>

        <details class="global-options" aria-label="Global options">
          <summary class="options-summary">Options</summary>
          <div class="options-body">
            <div class="option-group sentence-bank-only">
              <span class="option-label">Difficulty filter</span>
              <div class="check-row" id="levelOptions"></div>
            </div>

            <label class="field compact-field">
              <span>Voice speed</span>
              <select id="voiceSpeed">
                <option value="normal">Normal</option>
                <option value="slow">Slow</option>
                <option value="very-slow">Very slow</option>
              </select>
            </label>

            <label class="field compact-field vocabulary-only vocabulary-quiz-only">
              <span>Quiz order</span>
              <select id="vocabularyOrder">
                <option value="random">Random order</option>
                <option value="list">List order</option>
              </select>
            </label>

            <div class="option-group vocabulary-only vocabulary-quiz-only">
              <span class="option-label">Translations</span>
              <label class="level-check vocabulary-translation-check">
                <input type="checkbox" id="vocabularyHideTranslations">
                Hide until answered
              </label>
            </div>

            <div class="option-group pronunciation-only pronunciation-speaking-only">
              <span class="option-label">Prompt text</span>
              <label class="level-check">
                <input type="checkbox" id="pronunciationShowPinyin">
                Show pinyin
              </label>
            </div>

            <div class="option-group pwa-access" id="pwaAccess" hidden>
              <span class="option-label">App access</span>
              <div class="pwa-access-row">
                <span class="pwa-status" id="pwaStatus" data-state="preparing">Preparing offline access</span>
                <button class="ghost-btn pwa-action-btn" type="button" id="installApp" hidden>
                  <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M12 3v12"></path>
                    <path d="m7 10 5 5 5-5"></path>
                    <path d="M5 20h14"></path>
                  </svg>
                  Install app
                </button>
                <button class="ghost-btn pwa-action-btn" type="button" id="refreshApp" hidden>
                  <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M20 7v5h-5"></path>
                    <path d="M19 12a7 7 0 1 1-2-5"></path>
                  </svg>
                  Update app
                </button>
              </div>
            </div>
          </div>
        </details>
      </div>

      <main id="app" class="workspace" aria-live="polite"></main>
    </div>

    <dialog class="global-search-dialog" id="globalSearchDialog" aria-label="Search the learning library">
      <div class="global-search-shell">
        <div class="global-search-input-row">
          <svg class="button-icon global-search-input-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="11" cy="11" r="7"></circle>
            <path d="m20 20-4-4"></path>
          </svg>
          <input
            type="search"
            id="globalSearchInput"
            placeholder="Search Chinese, pinyin, or English"
            aria-label="Search Chinese, pinyin, or English"
            aria-controls="globalSearchResults"
            aria-autocomplete="list"
            autocomplete="off"
            autocapitalize="none"
            spellcheck="false">
          <button class="global-search-close" type="button" id="globalSearchClose" aria-label="Close search">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M6 6l12 12"></path>
              <path d="M18 6 6 18"></path>
            </svg>
          </button>
        </div>
        <div class="global-search-view-row">
          <div class="global-search-view-switcher" role="tablist" aria-label="Learning library view">
            <button class="active" type="button" role="tab" data-global-search-view="search" aria-selected="true" aria-controls="globalSearchResults">All</button>
            <button type="button" role="tab" data-global-search-view="saved" aria-selected="false" aria-controls="globalSearchResults">
              Saved <span id="globalSearchSavedCount">0</span>
            </button>
          </div>
          <div class="global-search-saved-actions" id="globalSearchSavedActions" hidden></div>
        </div>
        <div class="global-search-results" id="globalSearchResults" role="listbox" aria-label="Search results"></div>
      </div>
    </dialog>

    <dialog class="account-dialog" id="accountDialog" aria-label="Chinese Trainer account"></dialog>

    <script src="./assets/vendor/supabase-2.110.5.js" defer></script>
    <script src="./app-config.js" defer></script>
    <script src="./account.js" defer></script>
    <script src="./vocab-data.js" defer></script>
    <script src="./grammar-data.js" defer></script>
    <script src="./china-map-data.js" defer></script>
    <script src="./exam-data.js" defer></script>
    <script src="./reader-data.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
